<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .gallery-container { display: flex; flex-wrap: wrap; gap: 15px; }
        .image-item { 
            border: 1px solid #ccc; 
            padding: 10px; 
            background-color: #fff; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            width: 200px; /* Fixed width for items */
        }
        .image-item img { 
            max-width: 100%; 
            height: 150px; /* Fixed height for images */
            object-fit: cover; /* Ensures images cover the area without distortion */
            display: block; 
            margin-bottom: 5px;
        }
        .image-item p { margin: 5px 0 0 0; font-size: 0.9em; }
        .loading { text-align: center; width: 100%; padding: 20px; font-style: italic; color: #666; }
    </style>
</head>
<body>
{% include "nav.html" %}
    <h1>Image Gallery</h1>
    <div id="image-gallery" class="gallery-container">
        <div class="loading">Loading images...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/history') // Assuming /api/history provides a list of image filenames
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(images => {
                    const galleryContainer = document.getElementById('image-gallery');
                    galleryContainer.innerHTML = ''; // Clear the loading message

                    if (images.length === 0) {
                        galleryContainer.innerHTML = '<p>No images found.</p>';
                        return;
                    }

                    images.forEach(imageFilename => {
                        // Basic filtering, assuming filenames from history are images
                        // You might want more robust filtering if history contains non-image data
                        if (imageFilename.endsWith('.jpg') || imageFilename.endsWith('.png') || imageFilename.endsWith('.jpeg')) {
                            const imageItem = document.createElement('div');
                            imageItem.classList.add('image-item');

                            const imgElement = document.createElement('img');
                            // Use the existing API endpoint to serve the image
                            imgElement.src = `/api/image/${imageFilename}`; 
                            imgElement.alt = imageFilename;

                            const filenameLabel = document.createElement('p');
                            filenameLabel.textContent = imageFilename;

                            imageItem.appendChild(imgElement);
                            imageItem.appendChild(filenameLabel);
                            galleryContainer.appendChild(imageItem);
                        }
                    });
                })
                .catch(error => {
                    console.error('Error fetching or displaying images:', error);
                    const galleryContainer = document.getElementById('image-gallery');
                    galleryContainer.innerHTML = `<p style="color: red;">Error loading images: ${error.message}</p>`;
                });
        });
    </script>
</body>
</html>
