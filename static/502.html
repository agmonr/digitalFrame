<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Frame - Loading</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
        }
        .loader {
            border: 8px solid #333;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
            margin: 0 auto 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 300;
        }
        p {
            color: #888;
            font-size: 16px;
        }
        img {
            max-width: 200px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/static/loading.png" alt="Digital Frame">
        <div class="loader"></div>
        <h1>loading digital frame, please wait</h1>
        <p>The system is initializing or restarting. This usually takes a few seconds.</p>
    </div>
    <script>
        // Auto-refresh every 5 seconds to see if service is back up
        setTimeout(function() {
            window.location.reload();
        }, 5000);
    </script>
</body>
</html>
